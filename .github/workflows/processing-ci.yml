name: Compile Processing Sketch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Processing CLI
      run: |
        sudo apt-get update
        sudo snap install processing --classic
        sudo processing-java --version

    - name: Compile Processing Sketch
      run: |
        # Navigate to your sketch folder
        cd ./
        # Export sketch using processing-java CLI
        processing-java --sketch=`pwd` --output=`pwd`/build --run
