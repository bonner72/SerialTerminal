name: Compile Processing Sketch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Java (Processing 4 requires Java 11+)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 11

      # Step 3: Download Processing IDE
      - name: Download Processing 4
        run: |
          wget https://download.processing.org/processing-4.5.3-linux-x64.tgz -O processing.tgz
          tar -xzf processing.tgz
          mv processing-4.5.3 processing

      # Step 4: Compile the sketch
      - name: Compile Processing Sketch
        run: |
          ./processing/processing-java \
          --sketch=$GITHUB_WORKSPACE/mainCode.pde \
          --output=$GITHUB_WORKSPACE/build \
          --force \
          --build
          
      # Step 5: Optional: Archive the build outputs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: sketch-build
          path: build/
